<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Logoisum | 2001: A Tech Odyssey</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,500;0,700;1,500&family=Instrument+Serif:ital@1&display=swap" rel="stylesheet">
    <style>
        :root {
            --monolith: #000000;
            --glass: rgba(255, 255, 255, 0.9);
            --hal-red: #ff0000;
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Barlow', sans-serif;
            overflow: hidden;
            background: var(--monolith);
            height: 100%;
            width: 100%;
        }

        /* Pure CSS Starfield */
        .star-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            overflow: hidden;
        }

        @keyframes move-stars {
            from { transform: translateY(0); }
            to { transform: translateY(-1000px); }
        }

        .stars {
            width: 2px;
            height: 2px;
            background: transparent;
            box-shadow: 174px 480px #FFF, 1348px 303px #FFF, 341px 24px #FFF, 1142px 760px #FFF, 500px 200px #FFF, 800px 400px #FFF, 100px 900px #FFF, 1500px 100px #FFF, 1200px 800px #FFF, 300px 600px #FFF, 700px 100px #FFF, 900px 300px #FFF, 200px 500px #FFF, 1100px 200px #FFF, 1400px 700px #FFF, 600px 800px #FFF;
            animation: move-stars 50s linear infinite;
        }
        .stars:after {
            content: " ";
            position: absolute;
            top: 1000px;
            width: 2px;
            height: 2px;
            background: transparent;
            box-shadow: 174px 480px #FFF, 1348px 303px #FFF, 341px 24px #FFF, 1142px 760px #FFF, 500px 200px #FFF, 800px 400px #FFF, 100px 900px #FFF, 1500px 100px #FFF, 1200px 800px #FFF, 300px 600px #FFF, 700px 100px #FFF, 900px 300px #FFF, 200px 500px #FFF, 1100px 200px #FFF, 1400px 700px #FFF, 600px 800px #FFF;
        }

        .hero {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            z-index: 1;
        }

        .video-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
            filter: brightness(0.6);
        }

        nav {
            position: fixed;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 1200px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            height: 70px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            z-index: 1000;
        }

        .logo { font-weight: 700; color: #111; font-size: 1.4rem; letter-spacing: -1.5px; text-decoration: none; }
        .menu { display: flex; gap: 35px; }
        .menu a { text-decoration: none; color: #333; font-size: 14px; font-weight: 500; }
        .nav-cta { background: #111; color: white; padding: 12px 24px; border-radius: 30px; text-decoration: none; display: flex; align-items: center; gap: 10px; font-size: 14px; cursor: pointer; border: none; }

        .line1 { font-size: 80px; font-weight: 700; letter-spacing: -5px; text-transform: uppercase; display: block; }
        .line2 { font-family: 'Instrument Serif', serif; font-style: italic; font-size: 110px; display: block; margin-top: -5px; }
        .subtext { font-size: 20px; font-weight: 500; margin-top: 30px; max-width: 700px; opacity: 0.85; }
        .workreel-btn { margin-top: 50px; background: white; color: #111; padding: 20px 40px; border-radius: 50px; font-weight: 700; display: flex; align-items: center; gap: 15px; border: none; cursor: pointer; text-transform: uppercase; }

        #chat-container {
            position: fixed;
            bottom: 40px;
            right: 40px;
            width: 380px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            height: 500px;
            display: flex;
            flex-direction: column;
            z-index: 2000;
        }
        #chat-header { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); color: #aaa; font-size: 12px; display: flex; justify-content: space-between; }
        .hal-eye { width: 12px; height: 12px; background: red; border-radius: 50%; box-shadow: 0 0 10px red; }
        #chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 12px 18px; border-radius: 4px; font-size: 14px; font-family: 'Courier New', monospace; }
        .msg.caveman { background: rgba(255,255,255,0.1); color: white; border-left: 2px solid red; align-self: flex-start; }
        .msg.user { background: rgba(255,255,255,0.05); color: #ccc; align-self: flex-end; }
        #chat-input-area { padding: 20px; display: flex; gap: 10px; }
        #chat-input-area input { flex: 1; background: transparent; border: 1px solid rgba(255,255,255,0.1); color: white; padding: 10px; outline: none; }
        #chat-input-area button { background: white; border: none; padding: 0 20px; font-weight: 700; cursor: pointer; }

        /* Banner Style */
        .demo-banner {
            display: none;
            position: fixed;
            top: 110px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--hal-red);
            color: white;
            padding: 10px 30px;
            font-weight: 700;
            border-radius: 4px;
            z-index: 3000;
            text-transform: uppercase;
            box-shadow: 0 0 20px rgba(255,0,0,0.5);
            font-family: 'Courier New', monospace;
            animation: flicker 1s infinite;
        }
        @keyframes flicker {
            0% { opacity: 1; } 50% { opacity: 0.8; } 100% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div id="banner" class="demo-banner">UGH. THIS ONLY DEMO. NO REAL WORK HERE.</div>

    <div class="star-container">
        <div class="stars"></div>
    </div>

    <nav>
        <a href="/" class="logo">LOGOSIUM</a>
        <div class="menu">
            <a href="/about">About</a>
            <a href="/works">Works</a>
            <a href="/services">Services</a>
            <a href="/testimonial">Testimonial</a>
        </div>
        <button class="nav-cta" onclick="showDemo()">Book A Free Meeting</button>
    </nav>

    <section class="hero">
        <video class="video-bg" autoplay muted loop playsinline poster="https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?auto=format&fit=crop&q=80&w=1920">
            <source src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260228_065522_522e2295-ba22-457e-8fdb-fbcd68109c73.mp4" type="video/mp4">
        </video>

        <div class="hero-content">
            <h1>
                <span class="line1">Agency that makes your</span>
                <span class="line2">videos & reels viral</span>
            </h1>
            <p class="subtext">Elevating short-form storytelling for the next evolution of Creators and Brands.</p>
            <button class="workreel-btn" onclick="showDemo()">See Our Workreel</button>
        </div>
    </section>

    <div id="chat-container">
        <div id="chat-header"><span>AE-35 UNIT: ACTIVE</span><div class="hal-eye"></div></div>
        <div id="chat-messages"><div class="msg caveman">Me Caveman. Talk tech. Me grunt.</div></div>
        <form id="chat-input-area"><input type="text" id="msg-input" placeholder="Query..."><button type="submit">EXE</button></form>
    </div>

    <script>
        function showDemo() {
            const b = document.getElementById('banner');
            b.style.display = 'block';
            setTimeout(() => { b.style.display = 'none'; }, 3000);
        }

        const msgs = document.getElementById('chat-messages');
        const form = document.querySelector('form');
        const input = document.getElementById('msg-input');
        form.onsubmit = async (e) => {
            e.preventDefault();
            const text = input.value.trim();
            if (!text) return;
            const userMsg = document.createElement('div');
            userMsg.className = 'msg user';
            userMsg.textContent = text;
            msgs.appendChild(userMsg);
            input.value = '';
            try {
                const res = await fetch('/api/grunt', { method: 'POST', body: JSON.stringify({message: text}) });
                const data = await res.json();
                const caveMsg = document.createElement('div');
                caveMsg.className = 'msg caveman';
                caveMsg.textContent = data.reply;
                msgs.appendChild(caveMsg);
                msgs.scrollTop = msgs.scrollHeight;
            } catch (err) { }
        };
    </script>
</body>
</html>
