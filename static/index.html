<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Caveman Tech</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icon.png">
    <style>
        :root {
            --stone: #4a4a4a;
            --dirt: #3d2b1f;
            --bone: #f5f5dc;
            --fire: #e25822;
        }
        body {
            background-color: var(--dirt);
            color: var(--bone);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        header {
            background-color: var(--stone);
            padding: 10px;
            text-align: center;
            border-bottom: 5px solid #222;
            font-weight: bold;
            font-size: 1.5em;
        }
        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .message {
            max-width: 80%;
            padding: 10px 15px;
            border-radius: 10px;
            line-height: 1.4;
            position: relative;
        }
        .user {
            align-self: flex-end;
            background-color: var(--stone);
            border: 2px solid var(--bone);
        }
        .caveman {
            align-self: flex-start;
            background-color: #222;
            border: 2px solid var(--fire);
        }
        .caveman::before {
            content: "GRUNT: ";
            color: var(--fire);
            font-weight: bold;
        }
        #input-area {
            background-color: var(--stone);
            padding: 15px;
            display: flex;
            gap: 10px;
            border-top: 5px solid #222;
        }
        input {
            flex: 1;
            background-color: var(--dirt);
            border: 2px solid var(--bone);
            color: var(--bone);
            padding: 10px;
            font-family: inherit;
            font-size: 16px;
            border-radius: 5px;
        }
        button {
            background-color: var(--fire);
            color: white;
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            text-transform: uppercase;
        }
        button:active {
            transform: translateY(2px);
        }
    </style>
</head>
<body>
    <header>CAVEMAN TECH</header>
    <div id="chat">
        <div class="message caveman">Me Caveman. Talk tech. Me grunt.</div>
    </div>
    <form id="input-area">
        <input type="text" id="msg" placeholder="Type technical thing..." autocomplete="off">
        <button type="submit">GRUNT</button>
    </form>

    <script>
        const chat = document.getElementById('chat');
        const form = document.getElementById('input-area');
        const input = document.getElementById('msg');

        function appendMessage(text, type) {
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.textContent = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        form.onsubmit = async (e) => {
            e.preventDefault();
            const text = input.value.trim();
            if (!text) return;

            appendMessage(text, 'user');
            input.value = '';

            try {
                const response = await fetch('/api/grunt', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                const data = await response.json();
                appendMessage(data.reply, 'caveman');
            } catch (err) {
                appendMessage("Ugh. Cloud broken. Try again.", 'caveman');
            }
        };

        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js');
            });
        }
    </script>
</body>
</html>
