<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Works | Caveman Odyssey</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,500;0,700;1,500&family=Instrument+Serif:ital@1&display=swap" rel="stylesheet">
    <style>
        :root { --monolith: #000000; --glass: rgba(255, 255, 255, 0.9); }
        body, html { margin: 0; padding: 0; font-family: 'Barlow', sans-serif; background: var(--monolith); color: white; height: 100%; overflow: hidden; }
        .star-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%); }
        @keyframes move-stars { from { transform: translateY(0); } to { transform: translateY(-1000px); } }
        .stars { width: 2px; height: 2px; background: transparent; box-shadow: 174px 480px #FFF, 1348px 303px #FFF, 341px 24px #FFF, 1142px 760px #FFF, 500px 200px #FFF, 800px 400px #FFF, 100px 900px #FFF, 1500px 100px #FFF, 1200px 800px #FFF, 300px 600px #FFF, 700px 100px #FFF, 900px 300px #FFF, 200px 500px #FFF, 1100px 200px #FFF, 1400px 700px #FFF, 600px 800px #FFF; animation: move-stars 50s linear infinite; }
        .stars:after { content: " "; position: absolute; top: 1000px; width: 2px; height: 2px; background: transparent; box-shadow: 174px 480px #FFF, 1348px 303px #FFF, 341px 24px #FFF, 1142px 760px #FFF, 500px 200px #FFF, 800px 400px #FFF, 100px 900px #FFF, 1500px 100px #FFF, 1200px 800px #FFF, 300px 600px #FFF, 700px 100px #FFF, 900px 300px #FFF, 200px 500px #FFF, 1100px 200px #FFF, 1400px 700px #FFF, 600px 800px #FFF; }
        nav { position: fixed; top: 25px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 1200px; background: var(--glass); backdrop-filter: blur(15px); height: 70px; border-radius: 16px; display: flex; align-items: center; justify-content: space-between; padding: 0 30px; z-index: 1000; }
        .logo { font-weight: 700; color: #111; font-size: 1.4rem; letter-spacing: -1.5px; text-decoration: none; }
        .menu { display: flex; gap: 35px; }
        .menu a { text-decoration: none; color: #333; font-size: 14px; font-weight: 500; }
        .content { position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; }
        h1 { font-family: 'Instrument Serif', serif; font-style: italic; font-size: 80px; }
        .grid { display: flex; gap: 20px; margin-top: 40px; }
        .item { width: 200px; height: 300px; border: 1px solid rgba(255,255,255,0.2); border-radius: 10px; display: flex; align-items: flex-end; justify-content: center; font-weight: 700; text-transform: uppercase; overflow: hidden; position: relative; background-size: cover; background-position: center; }
        .item span { position: relative; z-index: 1; padding: 12px; background: rgba(0,0,0,0.55); width: 100%; text-align: center; font-size: 13px; }
    </style>
</head>
<body>
    <div class="star-container"><div class="stars"></div></div>
    <nav>
        <a href="/" class="logo">LOGOSIUM</a>
        <div class="menu">
            <a href="/about">About</a>
            <a href="/works">Works</a>
            <a href="/services">Services</a>
            <a href="/testimonial">Testimonial</a>
        </div>
    </nav>
    <div class="content">
        <h1>Cosmic Works</h1>
        <div class="grid">
            <div class="item" style="background-image: url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&q=80&w=400');"><span>Viral Reel #1</span></div>
            <div class="item" style="background-image: url('https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?auto=format&fit=crop&q=80&w=400');"><span>Brand Odyssey</span></div>
            <div class="item" style="background-image: url('https://images.unsplash.com/photo-1462331940025-496dfbfc7564?auto=format&fit=crop&q=80&w=400');"><span>The Monolith</span></div>
        </div>
    </div>
</body>
</html>
